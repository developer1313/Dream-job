<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us</title>
  <link rel="stylesheet" href="./about-us.css">

  <!-- Bootstrap + Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <style>
    .text-success {
      color: #07351a !important;
    }

    .bg-success {
      background-color: #07351a !important;
    }
  </style>
</head>

<body>
  <!-- ===== NAVBAR ===== -->
  <div id="navbar"></div>

  <section>

    <div class="row py-5">
      <div class="container col-lg-8 col-10">

        <div class="row col-lg-10 mx-auto">
          <!-- Top Label -->
          <div class="mb-3">
            <small class="text-uppercase fw-semibold letter-spacing text-muted">Contact Us</small>
          </div>

          <!-- Heading -->
          <h1 class="display-4 fw-normal mb-5">
            Built around <span class="text-success fst-italic">people</span> who take
            their careers seriously.
          </h1>

        </div>


      </div>
    </div>

    <div class="row about-section py-5">
      <div class="container col-lg-8 col-10 py-5">
        <!-- Image -->



        <div class="row justify-content-center mb-5">
          <div class="col-lg-10">
            <div class="row g-4">

              <!-- LEFT INFO -->
              <div class="col-md-5">
                <div class="p-4 rounded-4 shadow-sm bg-white mb-3">
                  <i class="bi bi-envelope fs-4 text-success"></i>
                  <p class="text-muted small mt-2 mb-1">EMAIL</p>
                  <h6 class="mb-0">info@khaleejcareers.com</h6>
                </div>

                <div class="p-4 rounded-4 shadow-sm bg-white mb-3">
                  <i class="bi bi-telephone fs-4 text-success"></i>
                  <p class="text-muted small mt-2 mb-1">PHONE</p>
                  <h6 class="mb-0">+91 9038970462</h6>
                </div>

                <div class="p-4 rounded-4 shadow-sm bg-white">
                  <i class="bi bi-geo-alt fs-4 text-success"></i>
                  <p class="text-muted small mt-2 mb-1">REGION</p>
                  <h6 class="mb-0">GCC · Middle East</h6>
                </div>
              </div>

              <!-- RIGHT FORM -->
              <div class="col-md-7">
                <div class="p-4 p-md-5 rounded-4 shadow-sm bg-white">

                  <form>
                    <div class="row g-3">

                      <div class="col-md-6">
                        <label class="small text-muted">NAME</label>
                        <input type="text" class="form-control rounded-3" placeholder="Your full name">
                      </div>

                      <div class="col-md-6">
                        <label class="small text-muted">EMAIL</label>
                        <input type="email" class="form-control rounded-3" placeholder="you@company.com">
                      </div>

                      <div class="col-12">
                        <label class="small text-muted">SUBJECT</label>
                        <input type="text" class="form-control rounded-3" placeholder="What's this about?">
                      </div>

                      <div class="col-12">
                        <label class="small text-muted">MESSAGE</label>
                        <textarea class="form-control rounded-3" rows="4"
                          placeholder="Share the context – role, target market, timing."></textarea>
                      </div>

                      <div class="col-12 mt-3">
                        <button class="btn bg-success text-white px-4 py-2 rounded-pill">
                          <i class="bi bi-send"></i> Send Message
                        </button>
                      </div>

                    </div>
                  </form>

                </div>
              </div>

            </div>
          </div>
        </div>

      </div>
    </div>


  </section>

<div id="footer"></div>
<script>
  // Load Footer
  fetch("/includes/footer.html")
    .then(res => res.text())
    .then(data => {
      document.getElementById("footer").innerHTML = data;
    });

  // Load Navbar + Apply Active Class
  fetch("/includes/header.html")
    .then(res => res.text())
    .then(data => {
      document.getElementById("navbar").innerHTML = data;

      // 👉 NOW navbar exists
      const path = window.location.pathname;
      console.log(path)
      if (path === "/" || path.includes("index")) {
        document.getElementById("index")?.classList.add("active");
      } else if (path.includes("about")) {
        document.getElementById("about")?.classList.add("active");
      } else if (path.includes("contact")) {
        document.getElementById("contact")?.classList.add("active");
      } else {
        document.getElementById("cr")?.classList.add("active");
      }
    });
</script>

</body>

</html>
